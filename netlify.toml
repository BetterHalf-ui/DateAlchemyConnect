# Updated build configuration - August 21, 2025
[build]
  publish = "dist/public"
  command = "./build-netlify.sh"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/*"
  function = "inject-meta"

[[redirects]]
  from = "/api/newsletter"
  to = "/.netlify/functions/newsletter-api"
  status = 200

